<!DOCTYPE html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AdaptMind - Neuro-Adaptive Learning</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <script>
      tailwind = {
        config: {
          darkMode: 'class'
        }
      }
    </script>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; }
      input, textarea, select { color: #000000; }
      input::placeholder, textarea::placeholder { color: #64748b; }
      .custom-scrollbar::-webkit-scrollbar { width: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
      .perspective-1000 { perspective: 1000px; }
      .transform-style-3d { transform-style: preserve-3d; }
      .backface-hidden { backface-visibility: hidden; }
      .rotate-y-180 { transform: rotateY(180deg); }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      .animate-fadeIn { animation: fadeIn 0.3s ease-in-out; }
      @keyframes slideIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
      .animate-slideIn { animation: slideIn 0.3s ease-out; }
      
      /* Dark mode overrides for better readability */
      .dark .text-slate-900 { color: #f8fafc !important; }
      .dark .text-slate-800 { color: #f1f5f9 !important; }
      .dark .text-slate-700 { color: #e2e8f0 !important; }
      .dark .text-slate-600 { color: #cbd5e1 !important; }
      .dark .text-slate-500 { color: #94a3b8 !important; }
      .dark .bg-white { background-color: #1e293b !important; color: #f1f5f9; }
      .dark .bg-slate-50 { background-color: #0f172a !important; }
      .dark .bg-slate-100 { background-color: #334155 !important; }
      .dark .border-slate-200 { border-color: #475569 !important; }
      .dark .border-slate-300 { border-color: #475569 !important; }
      .dark .border-slate-100 { border-color: #334155 !important; }
      .dark .shadow-sm { box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.5) !important; }
      .dark .bg-slate-800 { background-color: #1e293b !important; }
      .dark input, .dark textarea { background-color: #334155 !important; color: #f1f5f9 !important; border-color: #475569 !important; }
    </style>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0"
  }
}
</script>
</head>
  <body>
    <div id="root">
      <div id="initial-loader" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background-color:#f8fafc;z-index:9999;">
        <svg style="width:64px;height:64px;color:#2563eb;animation:pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;margin-bottom:16px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9.5 2A5 5 0 0 1 12 8v4"></path>
          <path d="M12 12v4a5 5 0 0 1-2.5 6"></path>
          <path d="M12 12H8a5 5 0 0 1-6-2.5"></path>
          <path d="M16 12h4a5 5 0 0 1 6 2.5"></path>
          <path d="M12 12V8a5 5 0 0 1 2.5-6"></path>
          <path d="M12 12v4a5 5 0 0 0 2.5 6"></path>
          <path d="M12 12h-4a5 5 0 0 0-6 2.5"></path>
          <path d="M12 12h4a5 5 0 0 0 6-2.5"></path>
        </svg>
        <div style="color:#64748b;font-weight:500;font-size:1.125rem;font-family:sans-serif;">Carregando AdaptMind...</div>
        <style>
          @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .5; transform: scale(0.95); } }
        </style>
      </div>
    </div>
    
    <!-- VLibras Widget -->
    <div vw class="enabled">
      <div vw-access-button class="active"></div>
      <div vw-plugin-wrapper>
        <div class="vw-plugin-top-wrapper"></div>
      </div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js" defer></script>
    <script>
      window.addEventListener('load', () => {
        if (window.VLibras) {
          new window.VLibras.Widget('https://vlibras.gov.br/app');
        }
      });
    </script>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
